stages:
  - lint

# Syntaxe Python
ruff:
  image: python:3.12
  stage: lint
  before_script:
    - pip install ruff
  script:
    - ruff check --output-format junit --output-file report.xml
  artifacts:
    paths:
      - report.xml
    reports:
      junit: report.xml
    when: always
  only:
    - merge_requests